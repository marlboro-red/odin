name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show && rustup component add rustfmt clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features
      - name: Docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  features:
    name: feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show && rustup component add clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # Each feature subset of odin-core must build clean on its own, so a runtime-only
      # dependency can't silently leak into the parse-only paths.
      - name: Clippy each feature subset
        run: |
          for feats in ir templating "ir,templating" runtime mock full telemetry otlp; do
            echo "::group::--features $feats"
            cargo clippy -p odin-core --no-default-features --features "$feats" --all-targets
            echo "::endgroup::"
          done
      # The headline guarantee: a parse-only (`ir`) build pulls in none of the async stack.
      - name: Assert the `ir` build is dependency-light
        run: |
          tree=$(cargo tree -p odin-core --no-default-features --features ir -e normal)
          echo "$tree"
          for forbidden in tokio async-trait rusqlite minijinja futures-util; do
            if echo "$tree" | grep -qi "$forbidden"; then
              echo "::error::parse-only \`ir\` build unexpectedly pulls in $forbidden"
              exit 1
            fi
          done

  windows:
    name: windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup show && rustup component add clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # Compiles + lints odin-core on Windows — including the `#[cfg(windows)]` shell resolver that
      # can't be built on the Unix dev box / Unix CI. The runner ships Git for Windows, so the
      # resolver finds `sh`/`bash` and the shell-driven tests run through it.
      - name: Clippy
        run: cargo clippy -p odin-core --all-targets --all-features
      # Run the odin-core suite on Windows: the shell resolver, byte-stable git (autocrlf override),
      # process spawning, validation, and the portable engine smoke all execute here.
      - name: Test
        run: cargo test -p odin-core --all-features

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Verify the crate actually builds on the MSRV declared in Cargo.toml (rust-version).
      - name: Install Rust 1.85
        run: rustup toolchain install 1.85 --profile minimal
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check on 1.85
        run: cargo +1.85 check --workspace --all-features
